name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

# Annule les jobs en cours si on repousse sur la même branche (gain de temps)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Étape 1 : Qualité du code et Types
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: just install-deps

      - name: Lint Check (Biome)
        run: just lint

      - name: Fallow audit (new issues only)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: npx fallow audit --fail-on-issues --format compact --changed-since "${BASE_SHA:-HEAD~1}"

      - name: TypeScript Build & Global Check
        run: just ts-build

  # Étape 2 : Tests Backend (en parallèle avec le Frontend)
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: quality # On ne lance les tests que si le build de base passe
    services:
      # Utilisation du service Postgres directement dans l'Action
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: appdb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: just install-deps

      - name: Prepare Backend DB & Run Tests
        env:
          DATABASE_URL: postgres://app:testpassword@localhost:5433/appdb_test
        continue-on-error: true
        run: |
          cd backend && bun x drizzle-kit migrate
          mkdir -p test-results
          bun test --reporter=junit > test-results/backend.xml

      - name: Backend Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: backend/test-results/backend.xml
          reporter: java-junit
          fail-on-error: true

  # Étape 2b : Auto-tag drift guard (CHECK vs TAG_HIT_RATE_BUDGET)
  audit-auto-tags:
    name: Auto-tag drift check
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: appdb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: just install-deps

      - name: Migrate schema + load corpus snapshot
        # CHECK validates per-(slug,category) hit rates against
        # TAG_HIT_RATE_BUDGET, calibrated on the full 3601-product corpus
        # committed at backend/src/db/snapshot/data.sql. JS seed-core would
        # only seed ~500 products and produce spurious FAILs.
        env:
          DATABASE_URL: postgres://app:testpassword@localhost:5433/appdb_test
          APP_DATABASE_URL: postgres://app:testpassword@localhost:5433/appdb_test
          PGPASSWORD: testpassword
          JWT_SECRET: ci-jwt-secret-at-least-32-chars-long
          REFRESH_SECRET: ci-refresh-secret-at-least-32-chars-long
          BREVO_API_KEY: ci-brevo
          FRONTEND_URL: http://localhost:5173
          GOOGLE_CLIENT_ID: ci-client-id
          GOOGLE_CLIENT_SECRET: ci-client-secret
          GOOGLE_REDIRECT_URI: http://localhost:3000/auth/google/callback
          BUNNY_STORAGE_ZONE: ci-zone
          BUNNY_STORAGE_PASSWORD: ci-password
          IMAGE_CDN_BASE: https://ci-cdn.example.com
        run: |
          cd backend && bun x drizzle-kit migrate
          cd ..
          psql -h localhost -p 5433 -U app -d appdb_test -v ON_ERROR_STOP=1 -c \
            "DO \$\$ DECLARE r record; BEGIN FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname='public') LOOP EXECUTE 'TRUNCATE ' || quote_ident(r.tablename) || ' RESTART IDENTITY CASCADE'; END LOOP; END \$\$;"
          psql -h localhost -p 5433 -U app -d appdb_test -v ON_ERROR_STOP=1 -f backend/src/db/snapshot/data.sql > /dev/null

      - name: Audit auto-tags drift (CHECK vs TAG_HIT_RATE_BUDGET)
        # Placeholder env vars satisfy backend/src/config/env.ts zod schema —
        # the audit runner only uses DATABASE_URL functionally.
        env:
          DATABASE_URL: postgres://app:testpassword@localhost:5433/appdb_test
          APP_DATABASE_URL: postgres://app:testpassword@localhost:5433/appdb_test
          JWT_SECRET: ci-jwt-secret-at-least-32-chars-long
          REFRESH_SECRET: ci-refresh-secret-at-least-32-chars-long
          BREVO_API_KEY: ci-brevo
          FRONTEND_URL: http://localhost:5173
          GOOGLE_CLIENT_ID: ci-client-id
          GOOGLE_CLIENT_SECRET: ci-client-secret
          GOOGLE_REDIRECT_URI: http://localhost:3000/auth/google/callback
          BUNNY_STORAGE_ZONE: ci-zone
          BUNNY_STORAGE_PASSWORD: ci-password
          IMAGE_CDN_BASE: https://ci-cdn.example.com
          CHECK: '1'
        run: cd backend && bun run src/features/auto-tagging/runners/audit/main.ts

  # Étape 3 : Tests Frontend (en parallèle avec le Backend)
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: just install-deps

      - name: Run Frontend Tests
        continue-on-error: true
        run: |
          mkdir -p frontend/test-results
          cd frontend && bunx vitest run --reporter=junit --outputFile=test-results/frontend.xml

      - name: Frontend Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Tests
          path: frontend/test-results/frontend.xml
          reporter: java-junit
          fail-on-error: true
