pre-commit:
  commands:
    react-doctor:
      run: |
        react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX")

        if cd frontend && bunx react-doctor@0.4.0 --staged --blocking error > "$react_doctor_output" 2>&1; then
          rm -f "$react_doctor_output"
        else
          rm -f "$react_doctor_output"
          printf "%s\n" \
            "React Doctor found staged regressions." \
            "Run react-doctor --staged --blocking error to inspect." \
            "Fix the flagged regressions before committing." >&2
          exit 1
        fi

    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css,md}"
      # --no-errors-on-unmatched: biome 2.5 doesn't process .md, so a docs-only commit
      # would exit 1 ("No files processed"). Real lint violations still fail the hook.
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

