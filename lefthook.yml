pre-commit:
  commands:
    react-doctor:
      run: react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX"); if react-doctor --staged --fail-on warning > "$react_doctor_output" 2>&1; then rm -f "$react_doctor_output"; else rm -f "$react_doctor_output"; printf "%s\n" "React Doctor found staged regressions." "Run react-doctor --staged --fail-on warning to inspect." "Fix the flagged regressions before committing." >&2; fi
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
