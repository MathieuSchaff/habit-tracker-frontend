<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- @layer order must be declared before any CSS loads. Rolldown strips the
         bare @layer statement from the bundled CSS, so without this the cascade
         falls back to encounter order and component styles lose to reset/base. -->
    <style>
      @layer reset, variables, base, components, utilities;
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Aurore réunit vos produits skincare, vos notes et les raisons de chaque choix — pour décider sans refaire la recherche. Sans score, sans publicité."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Aurore — votre skincare, au même endroit" />
    <meta
      property="og:description"
      content="Réunissez vos produits skincare, lisez leurs formules et gardez la raison de chaque décision. Sans score, sans verdict, sans publicité."
    />
    <meta name="twitter:card" content="summary" />

    <!-- Product images load from the Bunny CDN; warm DNS+TLS+TCP before the LCP image request. -->
    <link rel="preconnect" href="https://aurore-cdn.b-cdn.net" />
    <link rel="dns-prefetch" href="https://aurore-cdn.b-cdn.net" />

    <title>Aurore - Simplifiez vos routines</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
