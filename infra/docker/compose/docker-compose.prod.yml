# =========================
# Configuration PROD (surcharges)
# Utilisation: docker compose -f infra/docker/compose/docker-compose.yml -f infra/docker/compose/docker-compose.prod.yml up -d
# =========================

services:
  db:
    restart: unless-stopped
    # Loopback seulement (pas internet) : joignable par tunnel SSH pour GUI/admin (dev_readonly).
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 512m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ../../..
      dockerfile: infra/docker/images/backend/Dockerfile
      target: prod

    restart: unless-stopped
    # Laisse le handler SIGTERM drainer (cap interne 8s) avant le SIGKILL Docker.
    stop_grace_period: 15s
    mem_limit: 512m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info

    # Expose uniquement dans le réseau Docker (pas sur l'hôte)
    expose:
      - "3000"

    # The bun-debian image ships neither wget nor curl, so probe with bun itself;
    # a wget-based check stays unhealthy forever and nginx (depends_on
    # service_healthy) would never start.
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    mem_limit: 96m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
