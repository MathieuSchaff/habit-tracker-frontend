# =========================
# Configuration E2E (overlay sur dev)
# Usage: just e2e-up  (voir scripts/just/_vars.just)
#
# - Swap DB dev (volume persistant) → DB tmpfs avec creds testpassword
# - Ports hôte isolés (5434/3001/5174) pour coexister avec just dev
# =========================

services:
  db:
    container_name: e2e_db
    environment: !override
      POSTGRES_USER: app
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: appdb
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes: !override
      - ../../../backend/drizzle-init:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /var/lib/postgresql
    ports: !override
      - "5434:5432"

  api:
    container_name: e2e_api
    environment:
      DATABASE_URL: postgres://app:testpassword@db:5432/appdb
      APP_DATABASE_URL: postgres://app_runtime:testpassword@db:5432/appdb
      FRONTEND_URL: http://localhost:5174
      LOG_LEVEL: info
    ports: !override
      - "3001:3000"

  frontend:
    container_name: e2e_frontend
    ports: !override
      - "5174:5173"
