# Dev overlay. Containers run TypeScript source directly.
# `just dev` runs `ts-build` first (host-side typecheck + route generation preflight).

services:
  db:
    # Exposed for host DB tools (DBeaver, pgAdmin).
    ports:
      - "5432:5432"

  api:
    build:
      context: ../../..
      dockerfile: infra/docker/images/backend/Dockerfile
      target: dev
    user: "${UID:-1000}:${GID:-1000}"

    volumes:
      # Bind-mount source from host; deps stay in the image.
      - ../../../package.json:/app/package.json:ro
      - ../../../bun.lock:/app/bun.lock:ro
      - ../../../tsconfig.json:/app/tsconfig.json:ro

      - ../../../backend/package.json:/app/backend/package.json:ro
      - ../../../backend/src:/app/backend/src
      - ../../../backend/drizzle:/app/backend/drizzle:ro
      - ../../../backend/tsconfig.json:/app/backend/tsconfig.json:ro
      # Generated OpenAPI spec (host-built by `just docs`), served dev-only at /api/docs.
      - ../../../backend/openapi:/app/backend/openapi:ro
      # Writable scratch (ingest scrapers cache here). /app/backend is image-owned (root),
      # so without a host-backed mount the runtime user (1000) can't mkdir tmp → EACCES.
      - ../../../backend/tmp:/app/backend/tmp
      # Resolve the ignored src/output dir (often an absolute host symlink) at mount time.
      - ../../../backend/src/output:/app/backend/image-output

      - ../../../shared/package.json:/app/shared/package.json:ro
      - ../../../shared/src:/app/shared/src:ro
      - ../../../shared/tsconfig.json:/app/shared/tsconfig.json:ro

    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug
      IMAGE_OUTPUT_DIR: /app/backend/image-output

    ports:
      - "3000:3000"

    command: bun --watch src/index.ts

  frontend:
    build:
      context: ../../..
      dockerfile: infra/docker/images/frontend/Dockerfile.dev

    ports:
      - "5173:5173"

    volumes:
      # Bind-mount source from host; deps stay in the image.
      - ../../../package.json:/app/package.json:ro
      - ../../../bun.lock:/app/bun.lock:ro

      - ../../../frontend/package.json:/app/frontend/package.json:ro
      # No index.html under TanStack Start — the __root route owns the document.
      - ../../../frontend/public:/app/frontend/public:ro
      - ../../../frontend/src:/app/frontend/src
      - ../../../frontend/postcss.config.js:/app/frontend/postcss.config.js:ro
      - ../../../frontend/vite.config.ts:/app/frontend/vite.config.ts:ro
      - ../../../frontend/tsconfig.json:/app/frontend/tsconfig.json:ro
      - ../../../frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json:ro
      - ../../../frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json:ro

      - ../../../shared/package.json:/app/shared/package.json:ro
      - ../../../shared/src:/app/shared/src:ro
      - ../../../shared/tsconfig.json:/app/shared/tsconfig.json:ro

      - ../../../backend/package.json:/app/backend/package.json:ro
      - ../../../backend/tsconfig.json:/app/backend/tsconfig.json:ro

    environment:
      - VITE_API_URL=http://api:3000

    command: sh -c "cd /app/frontend && bun run dev --host 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # No nginx in dev; reach API and frontend directly.
  nginx:
    profiles: ["disabled"]

  # No certbot in dev; no local SSL.
  certbot:
    profiles: ["disabled"]
