# =========================
# Configuration DEV (surcharges)
# Utilisation: docker compose -f infra/docker/compose/docker-compose.yml -f infra/docker/compose/docker-compose.dev.yml up
#
# Dev containers run TypeScript source directly.
# `just dev` runs `ts-build` first as a host-side typecheck + route generation preflight.
# =========================

services:
  db:
    # Port exposé pour accès direct depuis l'hôte (DBeaver, pgAdmin, etc.)
    ports:
      - "5432:5432"

  api:
    build:
      context: ../../..
      dockerfile: infra/docker/images/backend/Dockerfile
      target: dev
    user: "${UID:-1000}:${GID:-1000}"

    volumes:
      # Bind mounts ciblés: Vite lit le code/config du host, les deps restent dans l'image.
      - ../../../package.json:/app/package.json:ro
      - ../../../bun.lock:/app/bun.lock:ro
      - ../../../tsconfig.json:/app/tsconfig.json:ro

      - ../../../backend/package.json:/app/backend/package.json:ro
      - ../../../backend/src:/app/backend/src
      - ../../../backend/drizzle:/app/backend/drizzle:ro
      - ../../../backend/tsconfig.json:/app/backend/tsconfig.json:ro

      - ../../../shared/package.json:/app/shared/package.json:ro
      - ../../../shared/src:/app/shared/src:ro
      - ../../../shared/tsconfig.json:/app/shared/tsconfig.json:ro

    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug

    ports:
      - "3000:3000"

    command: bun --watch src/index.ts

  frontend:
    build:
      context: ../../..
      dockerfile: infra/docker/images/frontend/Dockerfile.dev

    ports:
      - "5173:5173"

    volumes:
      # Bind mounts ciblés: le code vient du host, les deps restent dans l'image.
      - ../../../package.json:/app/package.json:ro
      - ../../../bun.lock:/app/bun.lock:ro

      - ../../../frontend/package.json:/app/frontend/package.json:ro
      - ../../../frontend/index.html:/app/frontend/index.html:ro
      - ../../../frontend/public:/app/frontend/public:ro
      - ../../../frontend/src:/app/frontend/src
      - ../../../frontend/postcss.config.js:/app/frontend/postcss.config.js:ro
      - ../../../frontend/vite.config.ts:/app/frontend/vite.config.ts:ro
      - ../../../frontend/tsconfig.json:/app/frontend/tsconfig.json:ro
      - ../../../frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json:ro
      - ../../../frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json:ro

      - ../../../shared/package.json:/app/shared/package.json:ro
      - ../../../shared/src:/app/shared/src:ro
      - ../../../shared/tsconfig.json:/app/shared/tsconfig.json:ro

      - ../../../backend/package.json:/app/backend/package.json:ro
      - ../../../backend/tsconfig.json:/app/backend/tsconfig.json:ro

    environment:
      - VITE_API_URL=http://api:3000

    command: sh -c "cd /app/frontend && bun run dev --host 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Désactive nginx en dev (accès direct à l'API et au frontend)
  nginx:
    profiles: ["disabled"]

  # Désactive certbot en dev (pas besoin de SSL en local)
  certbot:
    profiles: ["disabled"]
