# =========================
# Configuration de base commune à dev et prod
# =========================
# Explication:
# Services isolés: db, api, frontend, nginx, certbot
# Il y a 3 storage volumes qui sont persistants même quand on restart un conteneur
# 1 network privé, comme ça les conteneurs peuvent communiquer entre eux.
# En dev, docker-compose.dev.yml ajoute les bind mounts de code source.
#
services:
  # =========================
  # Base de données PostgreSQL
  # PostgreSQL 18 serveur
  # Ca crée un volume appelé pgdata qui contient les fichiers de la db
  # Est monté dans /var/lib/docker/volumes sur l'ordi
  # =========================
  db:
    # digest-pinned for reproducibility; bump consciously (Postgres on-disk format).
    image: postgres:18@sha256:52e6ffd11fddd081ae63880b635b2a61c14008c17fc98cdc7ce5472265516dd0
    container_name: app_db
    # Au final : DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/appdb
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: appdb
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      # https://hub.docker.com/_/postgres
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - appnet

  # =========================
  # API Backend (Bun + Hono)
  # Build via infra/docker/images/backend/Dockerfile
  # =========================
  api:
    container_name: app_api
    build:
      context: ../../..
      dockerfile: infra/docker/images/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy # Attends que la DB soit "en forme" avant de démarrer
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/appdb
      APP_DATABASE_URL: postgres://app_runtime:${APP_RUNTIME_PASSWORD}@db:5432/appdb
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      BUNNY_STORAGE_ZONE: ${BUNNY_STORAGE_ZONE}
      BUNNY_STORAGE_HOSTNAME: ${BUNNY_STORAGE_HOSTNAME}
      BUNNY_STORAGE_PASSWORD: ${BUNNY_STORAGE_PASSWORD}
      IMAGE_CDN_BASE: ${IMAGE_CDN_BASE}
      # Prod catalogue owner, read by the db-prod-admin seeder. Empty in dev.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

    networks:
      - appnet

  # =========================
  # Frontend React (Vite)
  # Build via infra/docker/images/frontend/Dockerfile
  # =========================
  frontend:
    container_name: app_frontend
    build:
      context: ../../..
      dockerfile: infra/docker/images/frontend/Dockerfile
    depends_on:
      - api # On a besoin de l'API pour que le site serve à quelque chose
    networks:
      - appnet

  # =========================
  # Reverse Proxy (Nginx)
  # =========================
  nginx:
    # 1.30.2-alpine, digest-pinned (CVE-2026-42945 "NGINX Rift" fixed in >=1.30.1). Bump digest to update.
    image: nginx:1.30.2-alpine@sha256:5f979dcfed4ce6461873f087e8c980d6e29b084b9e8776d9704a7e989b5f4898
    container_name: app_nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    environment:
      DOMAIN: ${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/templates:/etc/nginx/templates:ro
      - ../../nginx/reload-certs.sh:/reload-certs.sh:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: ["/bin/sh", "/reload-certs.sh"]
    networks:
      - appnet

  # =========================
  # Certbot (Let's Encrypt)
  # =========================
  certbot:
    # v5.6.0, digest-pinned (was floating :latest).
    image: certbot/certbot@sha256:0107d084c225631fc64a8313e19adb07275f7296fde338f7dfa93986c80b2e3e
    container_name: app_certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM;
          while :;
          do
            certbot renew;
            sleep 12h & wait $${!};
          done;"
    networks:
      - appnet

# =========================
# Volumes persistants
# =========================
volumes:
  pgdata:
  certbot_data:
  certbot_www:

# =========================
# Réseau Docker privé
# =========================
networks:
  appnet:
    driver: bridge
