# Observability overlay (Phase 1: logs/errors). Separate lifecycle — `just mon-up`
# brings it up; `just deploy` never touches it (no --remove-orphans).
# Shares the app network (external aurore_appnet) so later exporters can reach app_db.
# Grafana is loopback-only; reach it via `just mon-tunnel`.

services:
  loki:
    image: grafana/loki:3.3.0
    container_name: app_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ../../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - appnet

  alloy:
    image: grafana/alloy:v1.5.0
    container_name: app_alloy
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ../../monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - appnet

  grafana:
    image: grafana/grafana:11.4.0
    container_name: app_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env.prod}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    # Loopback only — SSH-tunnel access, never exposed publicly.
    ports:
      - "127.0.0.1:3001:3000"
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - appnet

volumes:
  loki_data:
  grafana_data:
  alloy_data:

networks:
  appnet:
    external: true
    name: aurore_appnet
