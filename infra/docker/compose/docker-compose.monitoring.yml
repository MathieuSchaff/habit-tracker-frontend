# Observability overlay. Only the Alloy agent runs on the VPS; logs/metrics/traces
# are stored + viewed in Grafana Cloud (no local Loki/Grafana, no data volume).
# Separate lifecycle — `just deploy` never touches it. Shares the app network so a
# later exporter could reach app_db.

services:
  alloy:
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    container_name: app_alloy
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    environment:
      # Grafana Cloud Loki push endpoint + credentials (from .env.prod).
      # url looks like https://logs-prod-012.grafana.net/loki/api/v1/push
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL:?set GRAFANA_CLOUD_LOKI_URL in .env.prod}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:?set GRAFANA_CLOUD_LOKI_USER in .env.prod}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN:?set GRAFANA_CLOUD_API_TOKEN in .env.prod}
    volumes:
      # compose lives in infra/docker/compose, config in infra/docker/monitoring → one `..`.
      - ../monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # positions/WAL only — NOT log storage. Tiny. Logs live in Grafana Cloud.
      - alloy_data:/var/lib/alloy/data
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - appnet

volumes:
  alloy_data:

networks:
  appnet:
    external: true
    name: aurore_appnet
